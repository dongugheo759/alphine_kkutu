<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파인 끄투</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .developer-badge { background: linear-gradient(45deg, #7c3aed, #db2777); color: white; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-left: 6px; font-weight: bold; }
    </style>
</head>
<body x-data="kkutuGame()">

    <div class="h-screen flex items-center justify-center p-4">
        
        <div x-show="page === 'title'" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border-4 border-yellow-400 text-center">
            <h1 @click="clickCount++; if(clickCount >= 5) { isDeveloper = true; alert('🛠️ 모드 활성화'); }" 
                class="text-6xl font-black text-yellow-500 mb-6 cursor-pointer select-none">
                Alpine KKUTU
            </h1>
            
            <input type="text" x-model="nickname" placeholder="닉네임 입력" 
                   class="w-full p-4 border-2 border-gray-200 rounded-xl mb-6 outline-none focus:border-yellow-400 text-center text-xl">
            
            <button @click="connectToServer()" 
                    class="w-full py-4 bg-yellow-400 text-white text-2xl rounded-2xl font-bold hover:bg-yellow-500 transition-colors">
                게임 시작
            </button>
        </div>

        <div x-show="page === 'game'" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden flex h-[600px] border-4 border-blue-400" style="display: none;">
            <div class="w-1/4 bg-gray-50 p-6 border-r overflow-y-auto">
                <h3 class="font-bold mb-4 border-b pb-2 text-gray-600">참가자</h3>
                <div class="space-y-2">
                    <template x-for="u in userList" :key="u.nickname">
                        <div class="p-2 bg-white rounded-lg shadow-sm flex justify-between items-center">
                            <div class="flex items-center">
                                <span class="text-sm font-bold text-gray-700" x-text="u.nickname"></span>
                                <template x-if="u.dev"><span class="developer-badge">DEV</span></template>
                            </div>
                            <span class="text-xs text-blue-500 font-bold" x-text="u.score"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="w-3/4 flex flex-col">
                <div class="flex-1 flex flex-col items-center justify-center bg-gray-50">
                    <p class="text-gray-400 mb-2 font-bold">제시어</p>
                    <h2 class="text-8xl font-black text-blue-600" x-text="currentWord"></h2>
                    <template x-if="isDeveloper">
                        <p class="mt-4 text-purple-600 animate-pulse font-bold">🛠️ 개발자 권한 사용 중</p>
                    </template>
                </div>

                <div class="p-6 bg-white border-t">
                    <input type="text" x-model="inputWord" @keyup.enter="sendWord()" placeholder="단어를 입력하고 엔터!" 
                           class="w-full p-5 bg-blue-50 border-2 border-blue-200 rounded-2xl text-2xl outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        </div>

    <script>
        function kkutuGame() {
            return {
                socket: null,
                page: 'title',
                nickname: '',
                isDeveloper: false,
                currentWord: '알파인',
                inputWord: '',
                userList: [],
                clickCount: 0,
                
                connectToServer() {
                    if(!this.nickname) return alert("닉네임을 적어주세요!");

                    // 소켓 연결 (현재 주소 자동 사용)
                    this.socket = io(); 

                    this.socket.on("connect", () => {
                        this.socket.emit("join", { 
                            nickname: this.nickname, 
                            isDeveloper: this.isDeveloper 
                        });
                        this.page = 'game';
                    });

                    this.socket.on("init_state", (data) => {
                        this.currentWord = data.word;
                        this.userList = data.users;
                    });

                    this.socket.on("word_success", (data) => {
                        this.currentWord = data.word;
                        this.userList = data.users;
                        this.inputWord = '';
                    });

                    this.socket.on("connect_error", (err) => {
                        alert("서버 연결에 실패했습니다.");
                    });
                },

                sendWord() {
                    if(this.inputWord.length < 2) return;
                    this.socket.emit("submit_word", { word: this.inputWord });
                }
            }
        }
    </script>
</body>
</html>
